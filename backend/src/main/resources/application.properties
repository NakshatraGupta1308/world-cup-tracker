spring.application.name=api

# H2 in-memory database (local dev). Resets on every restart, reseeded by DataSeeder.
spring.datasource.url=jdbc:h2:mem:worldcup
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Browse the database at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:worldcup)
spring.h2.console.enabled=true

# Hibernate creates tables from the entities on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
